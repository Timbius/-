<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Barber Shop</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .profile-info { background: #f4f4f4; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        button { background: #333; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #555; }
        .logout-btn { background: #dc3545; }
        .logout-btn:hover { background: #c82333; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; color: #333; text-decoration: none; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Главная</a>
        <a href="/profile.html">Профиль</a>
    </div>
    <h1>Личный кабинет</h1>
    <div id="profileContainer">
        <div class="profile-info">
            <h3>Информация о пользователе</h3>
            <p><strong>Имя:</strong> <span id="userName"></span></p>
            <p><strong>Email:</strong> <span id="userEmail"></span></p>
            <p><strong>Роль:</strong> <span id="userRole"></span></p>
        </div>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/auth/login.html';
        }

        async function loadUserProfile() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/auth/login.html';
                    return;
                }

                const user = await response.json();
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userRole').textContent = user.role;
            } catch (error) {
                console.error('Error loading profile:', error);
                window.location.href = '/auth/login.html';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        });

        loadUserProfile();
    </script>
</body>
</html>
